name: Deploy SAJA Store

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 91.99.20.199
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            # Ensure shared Docker network exists
            docker network inspect web >/dev/null 2>&1 || docker network create web

            cd /opt/saja-store

            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/hamidraza8/saja-store.git
            fi
            git fetch origin main
            git reset --hard origin/main

            cd deployment
            docker compose up -d --build --remove-orphans
            # Sync products.json into the persistent volume (volume overlays /app/data)
            docker cp /opt/saja-store/data/products.json saja-saja-store-1:/app/data/products.json
            docker exec saja-saja-store-1 node -e "require('./src/db').seed()"
            docker image prune -f

            echo "SAJA deployment complete!"
